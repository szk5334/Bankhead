            h(Seg, { val: Nn, opts: sizeOpts, onPick: setSize }),
            h("div", { style: lbl }, "play to"),
            h(Seg, { val: tgt, opts: [{ v: 100, l: "100" }, { v: 200, l: "200" }, { v: 0, l: "free" }], onPick: setTgt }),
            h("button", { style: bp, disabled: net.playerCount < 2, onClick: function () { props.onStart(tgt, Nn); } },
              net.playerCount < 2 ? "waiting for players…" : "start game"),
            h("button", { style: bg, onClick: net.backToLobby }, "leave (close room)")),
          h("div", { style: card }, h(ChatTabs, { net: net })));
      }

      // guest, pre-start
      return h("div", { style: box() },
        h("div", { style: card },
          h("div", { style: { fontSize: 20, fontWeight: 800, textAlign: "center" } }, "room " + net.room),
          net.full ? h("div", { style: { color: RED, textAlign: "center" } }, "that room is full")
                   : h("div", { style: { opacity: .8, fontSize: 13, textAlign: "center" } },
                       net.seat >= 1 ? ("you're in — seat #" + net.seat + " · " + (net.myInitials || "")) : (net.status || "joining…")),
          rosterList(net),
          net.full ? null : h("div", { style: { opacity: .6, fontSize: 12, textAlign: "center" } }, "waiting for the host to start the game…"),
          h("button", { style: bg, onClick: net.backToLobby }, "leave")),
        net.full ? null : section("room chat", h(ChatBox, { messages: net.roomChat, onSend: net.sendRoomChat })));
    };

    window.OnlineBar = function OnlineBar(props) {
      var net = props.net, h = React.createElement;
      var op = React.useState(false), open = op[0], setOpen = op[1];
      var mp = React.useState(false), mopen = mp[0], setMopen = mp[1];
      var seenRef = React.useRef(0);
      React.useEffect(function () { if (open) seenRef.current = net.roomChat.length; }, [open, net.roomChat.length]);
      var bar = { display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", padding: "6px 10px",
        marginBottom: 8, borderRadius: 0, background: "rgba(0,0,0,.28)", border: "1px solid " + LINE,
        fontFamily: mono, fontSize: 11, color: INK };
      var btn = { cursor: "pointer", padding: "3px 9px", borderRadius: 0, border: "1px solid " + LINE, background: "transparent", color: DIM, font: "inherit", letterSpacing: ".06em" };
      if (net.role === "off") {
        return h("div", { style: bar }, h("span", { style: { opacity: .7 } }, "solo"),
          h("button", { style: btn, onClick: net.backToLobby }, "\u2302 lobby"));
      }
      var unread = open ? 0 : Math.max(0, net.roomChat.length - seenRef.current);
      var dots = net.roster.map(function (r) {
        return h("span", { key: r.seat, style: { display: "inline-flex", alignItems: "center", gap: 3, opacity: r.connected ? 1 : .5 } },
          h("span", { style: { width: 7, height: 7, borderRadius: 7, background: r.connected ? GRN : RED } }),
          (r.initials || "?") + (r.connected ? "" : "\u2026"));
      });
      var sheet = { position: "fixed", left: 0, right: 0, bottom: 0, margin: "0 auto", maxWidth: 420, boxSizing: "border-box",
        background: "var(--bg,#0f3b2b)", borderTop: "1px solid " + LINE, padding: 12, zIndex: 9999,
        boxShadow: "0 -8px 24px rgba(0,0,0,.5)", fontFamily: mono, color: INK };
      return h(React.Fragment, null,
        h("div", { style: bar },
          h("b", null, "\uD83C\uDF10 " + (net.role === "host" ? "HOST" : "seat #" + net.seat) + " · " + net.room),
          h("span", { style: { display: "inline-flex", gap: 8, flexWrap: "wrap" } }, dots),
          net.role === "host" ? h("button", { style: btn, onClick: function () {
            if (navigator.clipboard) navigator.clipboard.writeText(location.origin + location.pathname + "#room=" + net.room);
          } }, "invite") : null,
          net.role === "host" ? h("button", { style: btn, onClick: function () { setMopen(!mopen); setOpen(false); } }, "\u2699 manage" + (net.requests && net.requests.length ? " " + net.requests.length : "")) : null,
          h("button", { style: btn, onClick: function () { setOpen(!open); setMopen(false); } }, "\uD83D\uDCAC chat" + (unread ? " " + unread : ""))),
        open ? h("div", { style: sheet },
          h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
            h("b", { style: { fontSize: 12 } }, "room chat · " + net.room),
            h("button", { style: btn, onClick: function () { setOpen(false); } }, "close")),
          h(ChatBox, { messages: net.roomChat, onSend: net.sendRoomChat })) : null,
        mopen && net.role === "host" ? h("div", { style: sheet },
          h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
            h("b", { style: { fontSize: 12 } }, "host controls · " + net.room),
            h("button", { style: btn, onClick: function () { setMopen(false); } }, "close")),
          h(HostManage, { net: net })) : null);
    };

    // ---- generic framework aliases (new games bind to these names) ----
    window.useGameNet = window.useGameNet || window.useBankheadNet;
    window.LobbyScreens = window.LobbyScreens || window.OnlineScreens;
    window.GameBar = window.GameBar || window.OnlineBar;
  })();
  </script>

  <!-- 3) THE GAME (drop-in artifact export; rewritten + mounted at load) -->
  <script>
  (function () {
    var boot = document.getElementById("boot");
    function fail(msg) { if (boot) boot.textContent = msg; console.error("[BANKHEAD]", msg); }
    function loadScript(src) {
      return new Promise(function (res, rej) {
        var s = document.createElement("script"); s.src = src; s.onload = res;
        s.onerror = function () { rej(new Error("could not load " + src)); };
        document.head.appendChild(s);
      });
    }
    async function ensureLibs() {
      if (!window.React)    await loadScript("https://unpkg.com/react@18/umd/react.production.min.js");
      if (!window.ReactDOM) await loadScript("https://unpkg.com/react-dom@18/umd/react-dom.production.min.js");
      if (!window.Babel)    await loadScript("https://unpkg.com/@babel/standalone/babel.min.js");
      if (!window.supabase) await loadScript("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2");
    }
    (async function () {
      try {
        await ensureLibs();
        if (!window.React || !window.ReactDOM || !window.Babel)
          throw new Error("core libraries unavailable (offline or a CDN is blocked)");
        var GAME_FILE = "bankhead.jsx"; var qm = (location.search || "").match(/[?&]game=([A-Za-z0-9_.-]+)/); if (qm) GAME_FILE = /\.jsx?$/.test(qm[1]) ? qm[1] : qm[1] + ".jsx";
        var res = await fetch(GAME_FILE, { cache: "no-cache" });
        if (!res.ok) throw new Error("couldn't fetch " + GAME_FILE + " (" + res.status + ")");
        var code = await res.text();
        code = code.replace(/^[ \t]*import\s+React\s*,?\s*(\{[^}]*\})?\s*from\s*["']react["'];?[ \t]*$/m,
          function (_m, named) { return named ? ("const " + named + " = React;") : "/* React (global) */"; });
        code = code.replace(/^[ \t]*import\s+[^\n]*from\s*["'][^"']+["'];?[ \t]*$/mg, function (mm) {
          console.warn("[BANKHEAD] dropped unresolved import:", mm.trim()); return ""; });
        var comp = "App";
        code = code.replace(/export\s+default\s+function\s+([A-Za-z0-9_$]+)\s*\(/, function (_m, name) { comp = name; return "function " + name + "("; });
        code = code.replace(/export\s+default\s+/, "");
        code += "\n;window.__BANKHEAD_APP__ = " + comp + ";\n";
        var out = Babel.transform(code, { presets: [["react", { runtime: "classic" }]], filename: "bankhead.jsx" }).code;
        var el = document.createElement("script"); el.textContent = out; document.body.appendChild(el);
        var App = (window.GAME && window.GAME.App) || window.__BANKHEAD_APP__;
        if (!App) throw new Error("game did not define its component");
        var root = document.getElementById("root");
        if (ReactDOM.createRoot) ReactDOM.createRoot(root).render(React.createElement(App));
        else ReactDOM.render(React.createElement(App), root);
      } catch (e) {
        fail("BANKHEAD failed to load: " + e.message + (location.protocol === "file:" ? "  (serve via http / GitHub Pages, not file://)" : ""));
      }
    })();
  })();
  </script>

  <div id="root"><div id="boot">loading BANKHEAD… · build lobby-r4</div></div>

  <!-- 2) CONFIG + NETWORK LAYER (plain JS)
       Transport = Supabase Realtime broadcast + presence ONLY.
       No database tables are used: nothing is read from or written to any row.
       Chat is broadcast-only (never persisted) and kept in memory on each device. -->
  <script>
  (function () {
    var SUPABASE_URL = "https://gmvdjsvdlbmbfdflkxnc.supabase.co";
    var SUPABASE_KEY = "sb_publishable_ibcK-ijGK14Up4MR258Pvw_X8xnT4zE";
    window.BH_BUILD = "lobby-r4";

    var m = (location.hash || "").match(/room=([A-Za-z0-9]+)/);
    window.BH_ROOM = m ? m[1].toUpperCase() : null;

    var configured = SUPABASE_URL.indexOf("PASTE_") === -1 && SUPABASE_KEY.indexOf("PASTE_") === -1;
    window.bhClient = (configured && window.supabase)
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

    function LS() { try { return window.localStorage; } catch (e) { return null; } }
    function jset(k, v) { var s = LS(); if (s) try { s.setItem(k, JSON.stringify(v)); } catch (e) {} }
    function jget(k) { var s = LS(); if (!s) return null; try { return JSON.parse(s.getItem(k) || "null"); } catch (e) { return null; } }
    function sset(k, v) { var s = LS(); if (s) try { s.setItem(k, v); } catch (e) {} }
    function sget(k) { var s = LS(); if (!s) return null; try { return s.getItem(k); } catch (e) { return null; } }
    function jdel(k) { var s = LS(); if (s) try { s.removeItem(k); } catch (e) {} }
    var FRESH = 6 * 3600e3;

    function genCode() {
      var A = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789", s = "";
      for (var i = 0; i < 4; i++) s += A[Math.floor(Math.random() * A.length)];
      return s;
    }
    var GAME_MOVES = ["PLAY", "PASS_BANK", "PICKUP", "DISCARD_DOWN"];
    var CHAT_CAP = 120;

    function redact(state, forSeat) {
      if (!state || !state.players) return state;
      function fake(n) { var a = []; for (var i = 0; i < n; i++) a.push({ id: 0, rank: "?", suit: "?", back: true }); return a; }
      var players = state.players.map(function (p, i) {
        if (i === forSeat) return p;
        var c = {}; for (var k in p) c[k] = p[k]; c.hand = fake((p.hand || []).length); return c;
      });
      var out = {}; for (var k in state) out[k] = state[k];
      out.players = players; out.stock = fake((state.stock || []).length);
      return out;
    }

    // =====================================================================
    // useBankheadNet
    // =====================================================================
    window.useBankheadNet = function useBankheadNet(opts) {
      var R = window.React, useState = R.useState, useEffect = R.useEffect, useRef = R.useRef, useCallback = R.useCallback;

      var cidRef = useRef(null);
      if (!cidRef.current) {
        var c = sget("bh_cid");
        if (!c) { c = Math.random().toString(36).slice(2, 10); sset("bh_cid", c); }
        cidRef.current = c;
      }

      var configured = !!window.bhClient;
      var A = useState(configured ? "lobby" : "off"), role = A[0], setRole = A[1];
      var B = useState(configured ? -1 : 0), seat = B[0], setSeat = B[1];
      var C = useState(""), status = C[0], setStatus = C[1];
      var D = useState(null), room = D[0], setRoom = D[1];
      var E = useState(null), snap = E[0], setSnap = E[1];
      var F = useState(0), snapV = F[0], setSnapV = F[1];
      var G = useState([]), roster = G[0], setRoster = G[1];
      var H = useState(false), full = H[0], setFull = H[1];
      var I = useState((sget("bh_initials") || "").slice(0, 3)), myInitials = I[0], setInits = I[1];
      var J = useState(["", "", "", ""]), names = J[0], setNames = J[1];
      var K = useState(0), namesV = K[0], setNamesV = K[1];
      var L = useState(100), target = L[0], setTargetSt = L[1];
      var M = useState([]), downSeats = M[0], setDownSeats = M[1];
      var N = useState([]), lobbyChat = N[0], setLobbyChat = N[1];
      var O = useState([]), roomChat = O[0], setRoomChat = O[1];
      var P = useState(false), hostStarted = P[0], setHostStarted = P[1];
      var Q = useState([]), games = Q[0], setGames = Q[1];
      var S = useState([]), highScores = S[0], setHighScores = S[1];
      var T = useState(null), pub = T[0], setPub = T[1];
      var U = useState(0), pubV = U[0], setPubV = U[1];

      var chanRef = useRef(null), lobbyChanRef = useRef(null), roleRef = useRef(role), seatRef = useRef(seat),
          fullRef = useRef(false), initRef = useRef(myInitials), downRef = useRef([]),
          ownersRef = useRef({ bySeat: {}, byCid: {} }), lastFullRef = useRef(null), lastTargetRef = useRef(100),
          retryRef = useRef(null), startedRef = useRef(false), hostCidRef = useRef(null), seqRef = useRef(0),
          discChanRef = useRef(null), playerCountRef = useRef(0), lastAdvRef = useRef(""), recordedRef = useRef(null);
      function RL(r) { roleRef.current = r; setRole(r); }
      function SL(k) { seatRef.current = k; setSeat(k); }

      var savedSession = useRef(undefined);
      if (savedSession.current === undefined) {
        var v = jget("bh_session"); savedSession.current = (v && Date.now() - v.ts < FRESH) ? v : null;
      }
      function saveSession(o) { jset("bh_session", o); savedSession.current = o; }
      function clearSession() { jdel("bh_session"); savedSession.current = null; }

      function namesFrom(r) { var a = ["", "", "", ""]; (r || []).forEach(function (x) { if (x.seat < 4) a[x.seat] = x.initials || ""; }); return a; }
      function applyRoster(r, tgt) {
        setRoster(r); setNames(namesFrom(r)); setNamesV(function (n) { return n + 1; });
        if (tgt != null) { setTargetSt(tgt); lastTargetRef.current = tgt; }
      }

      // ---------- chat (ephemeral, in-memory only) ----------
      function pushChat(setter, msg) {
        setter(function (list) { var next = list.concat([msg]); if (next.length > CHAT_CAP) next = next.slice(next.length - CHAT_CAP); return next; });
      }
      var sendLobbyChat = useCallback(function (text) {
        var t = (text || "").slice(0, 200); if (!t.trim()) return;
        var ch = lobbyChanRef.current, ts = Date.now();
        pushChat(setLobbyChat, { id: ++seqRef.current, from: initRef.current || "???", text: t, ts: ts, me: true });
        if (ch) try { ch.send({ type: "broadcast", event: "chat", payload: { from: initRef.current || "???", text: t, ts: ts } }); } catch (e) {}
      }, []);
      var sendRoomChat = useCallback(function (text) {
        var t = (text || "").slice(0, 200); if (!t.trim()) return;
        var ch = chanRef.current, ts = Date.now();
        pushChat(setRoomChat, { id: ++seqRef.current, from: initRef.current || "???", seat: seatRef.current, text: t, ts: ts, me: true });
        if (ch) try { ch.send({ type: "broadcast", event: "chat", payload: { from: initRef.current || "???", seat: seatRef.current, text: t, ts: ts } }); } catch (e) {}
      }, []);

      // ---------- HOST helpers ----------
      function currentRoster() {
        var o = ownersRef.current.bySeat, arr = [];
        Object.keys(o).forEach(function (k) {
          var st = +k, info = o[st];
          arr.push({ seat: st, initials: info.initials, connected: info.connected !== false, isHost: st === 0 });
        });
        arr.sort(function (a, b) { return a.seat - b.seat; });
        return arr;
      }
      function broadcastRoster() {
        var ch = chanRef.current; if (!ch) return;
        var r = currentRoster();
        applyRoster(r, lastTargetRef.current);
        var down = r.filter(function (x) { return !x.connected; }).map(function (x) { return x.seat; });
        downRef.current = down; setDownSeats(down);
        playerCountRef.current = r.filter(function (x) { return x.connected; }).length;
        ch.send({ type: "broadcast", event: "roster", payload: { roster: r, target: lastTargetRef.current, hostCid: (ownersRef.current.bySeat[0] || {}).cid } });
        advertise(false);
      }
      function refreshPresence() {
        var ch = chanRef.current; if (!ch || roleRef.current !== "host") return;
        var st = ch.presenceState(), present = {}; Object.keys(st).forEach(function (key) {
          (st[key] || []).forEach(function (p) { if (p && p.cid) present[p.cid] = true; });
        });
        var o = ownersRef.current;
        Object.keys(o.bySeat).forEach(function (k) {
          var sn = +k; if (sn === 0) { o.bySeat[0].connected = true; return; }
          var info = o.bySeat[sn];
          if (present[info.cid]) { info.connected = true; }
          else if (!startedRef.current) { delete o.bySeat[sn]; delete o.byCid[info.cid]; } // pre-start: free the seat
          else { info.connected = false; }                                                 // in-game: reserve for reconnect
        });
        broadcastRoster();
      }

      // ---------- discovery advertising (presence on a shared channel; no DB) ----------
      function advertise(force) {
        var ch = discChanRef.current; if (!ch || roleRef.current !== "host") return;
        var top = 0; try { top = Math.max.apply(null, (lastFullRef.current && lastFullRef.current.scores) || [0]); } catch (e) {}
        var meta = { code: chanRef.current && chanRef.current._bhCode, host: initRef.current, count: playerCountRef.current, cap: 4, status: startedRef.current ? "running" : "pending", top: top };
        var key = JSON.stringify(meta); if (!force && key === lastAdvRef.current) return; lastAdvRef.current = key;
        try { ch.track(meta); } catch (e) {}
      }
      function readGames() {
        var ch = discChanRef.current; if (!ch) return;
        var st = ch.presenceState(), map = {};
        Object.keys(st).forEach(function (key) { (st[key] || []).forEach(function (pp) { if (pp && pp.code) map[pp.code] = pp; }); });
        setGames(Object.keys(map).map(function (k) { return map[k]; }));
      }
      function recordHigh(full, tgt) {
        if (!tgt || tgt <= 0) return; var top = 0; try { top = Math.max.apply(null, full.scores || [0]); } catch (e) {}
        if (top < tgt) return; var code = chanRef.current && chanRef.current._bhCode; if (recordedRef.current === code) return; recordedRef.current = code;
        var list = jget("bh_highscores") || []; list.push({ code: code, top: top, host: initRef.current, ts: Date.now() });
        list.sort(function (a, b) { return b.top - a.top; }); list = list.slice(0, 10); jset("bh_highscores", list); setHighScores(list);
      }

      var send = useCallback(function (action) {
        var ch = chanRef.current; if (!ch) return;
        ch.send({ type: "broadcast", event: "action", payload: { cid: cidRef.current, action: action } });
      }, []);

      var broadcastState = useCallback(function (full, nm, tgt) {
        var ch = chanRef.current; if (!ch || roleRef.current !== "host") return;
        if (!startedRef.current) { startedRef.current = true; setHostStarted(true); }
        lastFullRef.current = full; if (tgt != null) lastTargetRef.current = tgt;
        jset("bh_host_state", { room: ch._bhCode, state: full, target: lastTargetRef.current, ts: Date.now() });
        var seats = ownersRef.current.bySeat;
        Object.keys(seats).forEach(function (k) {
          var sn = +k; if (sn === 0) return;
          ch.send({ type: "broadcast", event: "snap", payload: { seat: sn, state: redact(full, sn), target: lastTargetRef.current } });
        });
        ch.send({ type: "broadcast", event: "pub", payload: { state: redact(full, -1), target: lastTargetRef.current } });
        advertise(false); recordHigh(full, lastTargetRef.current);
      }, []);

      function wireHost(ch) {
        ch.on("broadcast", { event: "join" }, function (msg) {
          var p = msg.payload, o = ownersRef.current, cid = p.cid, ini = (p.initials || "").slice(0, 3).toUpperCase();
          var st = o.byCid[cid];
          if (st == null) {
            for (var k = 1; k <= 3; k++) { if (!o.bySeat[k]) { st = k; break; } }
            if (st == null) { ch.send({ type: "broadcast", event: "full", payload: { cid: cid } }); return; }
            o.bySeat[st] = { cid: cid, initials: ini, connected: true }; o.byCid[cid] = st;
          } else { o.bySeat[st].connected = true; if (ini) o.bySeat[st].initials = ini; }
          ch.send({ type: "broadcast", event: "seat", payload: { cid: cid, seat: st } });
          broadcastRoster();
          if (lastFullRef.current) ch.send({ type: "broadcast", event: "snap", payload: { seat: st, state: redact(lastFullRef.current, st), target: lastTargetRef.current } });
        });
        ch.on("broadcast", { event: "action" }, function (msg) {
          var p = msg.payload, owner = ownersRef.current.byCid[p.cid]; if (owner == null) return;
          var a = p.action || {};
          if (GAME_MOVES.indexOf(a.type) === -1) return;
          if (a.player != null && a.player !== owner) return;
          if (opts && opts.onAction) opts.onAction(a, owner);
        });
        ch.on("broadcast", { event: "chat" }, function (msg) {
          var p = msg.payload; pushChat(setRoomChat, { id: ++seqRef.current, from: p.from, seat: p.seat, text: p.text, ts: p.ts, me: false });
        });
        ch.on("broadcast", { event: "bye" }, function (msg) {
          var cid = msg.payload && msg.payload.cid; if (!cid) return;
          var o = ownersRef.current, st = o.byCid[cid]; if (st == null) return;
          if (!startedRef.current) { delete o.bySeat[st]; delete o.byCid[cid]; }
          else if (o.bySeat[st]) { o.bySeat[st].connected = false; }
          broadcastRoster();
        });
        ch.on("presence", { event: "sync" }, refreshPresence);
        ch.on("presence", { event: "join" }, refreshPresence);
        ch.on("presence", { event: "leave" }, refreshPresence);
      }
      function wireGuest(ch) {
        ch.on("broadcast", { event: "seat" }, function (msg) {
          if (msg.payload.cid !== cidRef.current) return;
          SL(msg.payload.seat); setFull(false); fullRef.current = false;
          setStatus("seated · #" + msg.payload.seat);
          try { ch.track({ cid: cidRef.current, initials: initRef.current, seat: msg.payload.seat, isHost: false }); } catch (e) {}
          saveSession({ role: "guest", room: ch._bhCode, initials: initRef.current, ts: Date.now() });
          if (retryRef.current) { clearInterval(retryRef.current); retryRef.current = null; }
        });
        ch.on("broadcast", { event: "full" }, function (msg) {
          if (msg.payload.cid !== cidRef.current) return;
          setFull(true); fullRef.current = true; setStatus("that room is full");
          if (retryRef.current) { clearInterval(retryRef.current); retryRef.current = null; }
        });
        ch.on("broadcast", { event: "roster" }, function (msg) { hostCidRef.current = msg.payload.hostCid || hostCidRef.current; applyRoster(msg.payload.roster, msg.payload.target); });
        ch.on("broadcast", { event: "snap" }, function (msg) {
          if (seatRef.current >= 1 && msg.payload.seat === seatRef.current) {
            setSnap(msg.payload.state); setSnapV(function (v) { return v + 1; });
            if (msg.payload.target != null) setTargetSt(msg.payload.target);
          }
        });
        ch.on("broadcast", { event: "chat" }, function (msg) {
          var p = msg.payload; pushChat(setRoomChat, { id: ++seqRef.current, from: p.from, seat: p.seat, text: p.text, ts: p.ts, me: false });
        });
        ch.on("broadcast", { event: "closed" }, function () {
          teardownRoom(); clearSession(); RL("lobby"); SL(-1); setFull(false); setStatus("the host closed the room");
        });
        ch.on("presence", { event: "leave" }, function (p) {
          var left = (p && p.leftPresences) || [];
          if (hostCidRef.current && left.some(function (x) { return x && x.cid === hostCidRef.current; }))
            setStatus("host disconnected — waiting for them to return…");
        });
      }

      function teardownRoom() {
        var ch = chanRef.current;
        if (ch) { try { window.bhClient.removeChannel(ch); } catch (e) { try { ch.unsubscribe(); } catch (_e) {} } chanRef.current = null; }
        ownersRef.current = { bySeat: {}, byCid: {} }; startedRef.current = false; hostCidRef.current = null;
        downRef.current = []; setDownSeats([]); setRoster([]); setSnap(null); setRoomChat([]); setRoom(null);
        if (retryRef.current) { clearInterval(retryRef.current); retryRef.current = null; }
      }
      var closeRoom = useCallback(function () {
        var ch = chanRef.current; if (ch) { try { ch.send({ type: "broadcast", event: "closed", payload: {} }); } catch (e) {} }
        try { if (discChanRef.current) discChanRef.current.untrack(); } catch (e) {}
        lastAdvRef.current = ""; recordedRef.current = null;
        clearSession(); teardownRoom(); RL("lobby"); SL(-1); setFull(false); setStatus("");
      }, []);

      var setInitials = useCallback(function (v) {
        v = (v || "").toUpperCase().replace(/[^A-Z]/g, "").slice(0, 3);
        initRef.current = v; setInits(v); sset("bh_initials", v);
      }, []);

      var hostGame = useCallback(function () {
        var client = window.bhClient; if (!client) { setStatus("add your Supabase keys in index.html"); return; }
        var code = genCode();
        var ch = client.channel("bankhead-" + code, { config: { presence: { key: cidRef.current }, broadcast: { self: false } } });
        ch._bhCode = code; chanRef.current = ch; setRoom(code); RL("host"); SL(0); setFull(false); startedRef.current = false; setRoomChat([]);
        ownersRef.current = { bySeat: { 0: { cid: cidRef.current, initials: initRef.current, connected: true } }, byCid: {} };
        ownersRef.current.byCid[cidRef.current] = 0;
        wireHost(ch);
        ch.subscribe(function (st) {
          if (st === "SUBSCRIBED") {
            setStatus("hosting · " + code);
            try { ch.track({ cid: cidRef.current, initials: initRef.current, seat: 0, isHost: true }); } catch (e) {}
            broadcastRoster();
          } else setStatus(st);
        });
        saveSession({ role: "host", room: code, initials: initRef.current, ts: Date.now() });
      }, []);

      var joinGame = useCallback(function (code) {
        var client = window.bhClient; if (!client) { setStatus("add your Supabase keys in index.html"); return; }
        code = (code || "").toUpperCase(); if (!code) return;
        var ch = client.channel("bankhead-" + code, { config: { presence: { key: cidRef.current }, broadcast: { self: false } } });
        ch._bhCode = code; chanRef.current = ch; setRoom(code); RL("guest"); SL(-1); setFull(false); fullRef.current = false; setRoomChat([]);
        wireGuest(ch);
        ch.subscribe(function (st) {
          if (st === "SUBSCRIBED") {
            setStatus("joining…");
            try { ch.track({ cid: cidRef.current, initials: initRef.current, seat: -1, isHost: false }); } catch (e) {}
            var announce = function () { ch.send({ type: "broadcast", event: "join", payload: { cid: cidRef.current, initials: initRef.current } }); };
            announce();
            retryRef.current = setInterval(function () {
              if (seatRef.current >= 1 || fullRef.current) { clearInterval(retryRef.current); retryRef.current = null; return; }
              announce();

      var spectate = useCallback(function (code) {
        var client = window.bhClient; if (!client) return; code = (code || "").toUpperCase(); if (!code) return;
        var ch = client.channel("bankhead-" + code, { config: { broadcast: { self: false } } });
        ch._bhCode = code; chanRef.current = ch; setRoom(code); RL("spectate"); setPub(null);
        ch.on("broadcast", { event: "pub" }, function (msg) { setPub(msg.payload.state); setPubV(function (v) { return v + 1; }); if (msg.payload.target != null) setTargetSt(msg.payload.target); });
        ch.on("broadcast", { event: "closed" }, function () { teardownRoom(); RL("lobby"); setStatus("the game ended"); });
        ch.subscribe(function (st) { setStatus(st === "SUBSCRIBED" ? ("spectating " + code) : st); });
      }, []);

      var rejoin = useCallback(function () {
        var s = savedSession.current; if (!s) return;
        setInitials(s.initials || "");
        if (s.role === "host") {
          var client = window.bhClient; if (!client) return;
          var ch = client.channel("bankhead-" + s.room, { config: { presence: { key: cidRef.current }, broadcast: { self: false } } });
          ch._bhCode = s.room; chanRef.current = ch; setRoom(s.room); RL("host"); SL(0); setRoomChat([]);
          ownersRef.current = { bySeat: { 0: { cid: cidRef.current, initials: s.initials, connected: true } }, byCid: {} };
          ownersRef.current.byCid[cidRef.current] = 0;
          wireHost(ch);
          var hs = jget("bh_host_state");
          ch.subscribe(function (st) {
            if (st === "SUBSCRIBED") {
              setStatus("resumed hosting · " + s.room);
              try { ch.track({ cid: cidRef.current, initials: s.initials, seat: 0, isHost: true }); } catch (e) {}
              if (hs && hs.room === s.room && opts && opts.onResume) { lastFullRef.current = hs.state; startedRef.current = true; lastTargetRef.current = hs.target || 100; opts.onResume(hs.state, hs.target || 100); }
              broadcastRoster();
            } else setStatus(st);
          });
        } else { joinGame(s.room); }
      }, []);

      var goSolo = useCallback(function () { if (opts && opts.onGoSolo) opts.onGoSolo(); RL("off"); SL(0); setStatus(""); }, []);
      var backToLobby = useCallback(function () {
        if (roleRef.current === "host") { closeRoom(); return; }
        var lc = chanRef.current; if (lc) { try { lc.send({ type: "broadcast", event: "bye", payload: { cid: cidRef.current } }); } catch (e) {} }
        clearSession(); teardownRoom(); RL("lobby"); SL(-1); setFull(false); setStatus("");
      }, []);

      // ---- lobby chat channel: joined only while on the lobby screen ----
      useEffect(function () {
        if (!configured) return;
        if (role === "lobby" || (role === "host" && !hostStarted)) {
          if (!lobbyChanRef.current) {
            var ch = window.bhClient.channel("bankhead-lobby", { config: { broadcast: { self: false } } });
            ch.on("broadcast", { event: "chat" }, function (msg) {
              var p = msg.payload; pushChat(setLobbyChat, { id: ++seqRef.current, from: p.from, text: p.text, ts: p.ts, me: false });
            });
            ch.subscribe();
            lobbyChanRef.current = ch;
          }
        } else if (lobbyChanRef.current) {
          try { window.bhClient.removeChannel(lobbyChanRef.current); } catch (e) {}
          lobbyChanRef.current = null;
        }

# .github/workflows/deploy-pages.yml
# Card Table — GitHub Pages deploy that unpacks EVERY tarball committed beside index.html.
#
# Model: you commit one or more `*.tar.gz` archives to the repo root (e.g. bridge-modular-site.tar.gz +
# bridge-dds-engine.tar.gz). This workflow copies the repo (minus git/CI/archives) into a staging dir,
# then extracts each archive on top — overlaying their files — and publishes the result. Adding another
# tarball later (a new game, an asset pack, a bigger engine) needs NO change here: it's globbed in.
#
# One-time setup: Repo → Settings → Pages → Source = "GitHub Actions".
# If your default branch isn't `main`, change `branches:` below.
# If you keep the tarballs in a subfolder instead of the repo root, set ARCHIVE_DIR to that folder.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCHIVE_DIR: .          # where the *.tar.gz live (repo root by default)
      SITE_DIR: _site         # staging dir that gets published
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site from repo + tarballs
        run: |
          set -euo pipefail
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"

          # 1) carry over the repo's own files (other games, legacy monolith, assets), EXCLUDING
          #    version control, this workflow, and the archives themselves. (tar-copy = no rsync dep.)
          tar cf - \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./*.tar.gz' \
            --exclude="./$SITE_DIR" \
            . | tar xf - -C "$SITE_DIR"

          # 2) overlay every archive (sorted, so overlap is deterministic — last wins).
          shopt -s nullglob
          archives=( $(ls -1 "$ARCHIVE_DIR"/*.tar.gz 2>/dev/null | sort) )
          if [ ${#archives[@]} -eq 0 ]; then
            echo "::error::no *.tar.gz found in '$ARCHIVE_DIR' — nothing to unpack."
            exit 1
          fi
          for a in "${archives[@]}"; do
            echo "unpacking $a"
            tar xzf "$a" -C "$SITE_DIR"
          done

          # 3) strip internal files that ride along in the archives (never meant to be served).
          find "$SITE_DIR" -type f \( \
                -name 'HANDOFF.md' -o -name 'MODULE_MAP.md' -o -name '*.tar.gz' \
             \) -delete

          # 4) GitHub Pages: don't run Jekyll (we serve files as-is, incl. leading-underscore paths).
          touch "$SITE_DIR/.nojekyll"

          echo "== published tree (top 2 levels) =="
          find "$SITE_DIR" -maxdepth 2 -type f | sort | head -80
          echo "== sanity =="
          test -f "$SITE_DIR/index.html" || { echo "::error::index.html missing from published site"; exit 1; }
          if [ -f "$SITE_DIR/bridge/grader/workerSrc.js" ]; then
            test -f "$SITE_DIR/bridge/grader/dds_engine.inline.js" \
              || echo "::warning::bridge deployed WITHOUT dds_engine.inline.js — grader will run pure-JS endgame-only. Did you commit bridge-dds-engine.tar.gz?"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
